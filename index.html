<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>语音识别 - VOICE RECOGNITION</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 背景图片层 -->
  <div id="background"></div>

  <!-- 右下角 Logo -->
  <img id="logo" src="img/logo.png" alt="Logo">

  <!-- 粒子背景画布 -->
  <canvas id="particles"></canvas>

  <!-- 页面顶部录音指示线 -->
  <div id="recording-line"></div>

  <!-- 主面板 -->
  <main id="app">
    <!-- 设置按钮 -->
    <button id="btn-settings" class="btn-settings" title="设置">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>

    <header class="header">
      <p class="title">实时语音转文字</p>
    </header>

    <!-- 识别文本展示区域 + 麦克风 + 工具栏 -->
    <div class="card-wrapper">
      <div class="card-main">
      <div id="transcript-container">
        <div id="transcript">
        </div>

        <button id="btn-mic" class="btn-mic" title="开始/停止录音 (空格键)">
          <svg class="icon-mic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
      </div>

      <!-- 提示文案（文本显示区域正下方） -->
      <p id="hint-text" class="hint-text">点击上方麦克风按钮开始语音识别</p>
      </div>

      <!-- 右侧工具栏 -->
      <div class="toolbar">
      <button id="btn-clear" class="toolbar-btn" title="清除文本">
        <svg class="toolbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
        <span>删除</span>
      </button>
      <button id="btn-copy" class="toolbar-btn" title="复制文本">
        <svg class="toolbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        <span>复制</span>
      </button>
    </div>
  </div>

    <!-- 声波动画条（录音时显示） -->
    <div id="waveform">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </div>

    <!-- 状态提示 -->
    <div id="status">点击麦克风按钮或按空格键开始</div>

    <!-- 浏览器不支持提示 -->
    <div id="unsupported" class="hidden">
      <p>您的浏览器不支持 Web Speech API 语音识别功能。</p>
      <p>请使用 <strong>Chrome</strong>、<strong>Edge</strong> 或 <strong>Safari</strong> 浏览器访问。</p>
    </div>
  </main>

  <!-- 设置面板 -->
  <div id="settings-overlay" class="hidden">
    <div id="settings-panel">
      <div class="settings-header">
        <h2>设置</h2>
        <button id="btn-settings-close" class="btn-close" title="关闭">&times;</button>
      </div>

      <div class="settings-body">
        <!-- 识别引擎选择 -->
        <div class="settings-section">
          <label class="settings-label">识别引擎</label>
          <div class="settings-radio-group">
            <label class="settings-radio">
              <input type="radio" name="backend" value="native" id="rb-native">
              <span>浏览器原生</span>
            </label>
            <label class="settings-radio">
              <input type="radio" name="backend" value="aliyun" id="rb-aliyun">
              <span>阿里云语音 (推荐国内用户)</span>
            </label>
          </div>
          <p class="settings-hint">国内网络建议使用阿里云引擎，浏览器原生引擎依赖Google服务。</p>
        </div>

        <!-- 背景图片开关 -->
        <div class="settings-section">
          <label class="settings-label">背景图片</label>
          <div class="settings-toggle-row">
            <span class="settings-toggle-text">使用背景图片</span>
            <label class="settings-toggle">
              <input type="checkbox" id="toggle-background">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <p class="settings-hint">开启后将显示背景图片并隐藏粒子动画效果。</p>
        </div>

        <!-- 阿里云 API 配置 -->
        <div id="aliyun-config" class="settings-section">
          <label class="settings-label">阿里云 API 凭证</label>
          <p class="settings-hint">
            请前往 <a href="https://nls-portal.console.aliyun.com/" target="_blank" rel="noopener">阿里云智能语音交互控制台</a>
            创建项目获取 AppKey，并获取 Access Token
          </p>
          <div class="settings-field">
            <label for="aliyun-appkey">AppKey</label>
            <input type="text" id="aliyun-appkey" placeholder="请输入 AppKey" value="dvMfm92KGSftjpep" autocomplete="off">
          </div>
          <div class="settings-field">
            <label for="aliyun-token">Token</label>
            <input type="password" id="aliyun-token" placeholder="请输入 Access Token" autocomplete="off">
          </div>
          <button id="btn-auto-token" class="btn-auto-token" type="button">自动获取</button>
          <p class="settings-hint">Token 有效期 24 小时，过期后需重新获取。可点击「自动获取」按钮通过服务端 API 获取，也可在控制台手动获取。</p>
        </div>
      </div>

      <div class="settings-footer">
        <button id="btn-settings-save" class="btn-save">保存设置</button>
      </div>
    </div>
  </div>

  <!-- 复制成功提示 -->
  <div id="toast" class="hidden">已复制到剪贴板</div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
